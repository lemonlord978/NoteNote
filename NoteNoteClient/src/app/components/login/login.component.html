<div class="login-container">
    <p-card header="Login" styleClass="p-mb-4">
      <div class="p-fluid">
        <div class="p-field">
            <p-floatLabel>
                <input id="username" type="text" pInputText [(ngModel)]="username" />
                <label for="username">Username</label>
            </p-floatLabel>
        </div>
  
        <div class="p-field">
            <p-floatLabel>
                <p-password id="password" [(ngModel)]="password" name="password" required toggleMask [feedback]="false" ></p-password>
                <label for="password">Password</label>
            </p-floatLabel>
        </div>
  
        <div class="p-field">
          <p-button label="Login" icon="pi pi-sign-in" (click)="login()" [disabled]="!username || !password"></p-button>
        </div>
      </div>
    </p-card>
  </div>
